name: Playwright CI Pipeline

on:
  workflow_dispatch:
    inputs:
      env:
        description: "Environment to run tests against"
        required: true
        default: "qa"
        type: choice
        options:
          - qa
          - stage
          - prod

      suite:
        description: "Test suite (smoke, regression, sanity)"
        required: true
        default: "smoke"
        type: choice
        options:
          - smoke
          - regression
          - sanity

  push:
    branches: [ "main" ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        env:
          TEST_ENV: ${{ github.event.inputs.env }}   # qa / stage / prod
          TEST_SUITE: ${{ github.event.inputs.suite }}
        run: |
          echo "Environment: $TEST_ENV"
          echo "Suite: $TEST_SUITE"

          npx playwright test \
            --grep "@${TEST_SUITE}"
            
      - name: Rerun failed tests
        if: failure()
        run: npx playwright test --last-failed

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

      - name: Upload trace, screenshots, videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: test-results
